name: CI

on:
  push:
    branches:
      - main


jobs:
  flake-check:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true

      - name: Install Nix  
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Nix Cache
        uses: DeterminateSystems/flakehub-cache-action@main

      - name: Flake Checker
        uses: DeterminateSystems/flake-checker-action@main
        with:
          check-owner: false
          check-supported: false
          fail-mode: true

      - name: Nix Flake Check
        run: nix flake check --show-trace

  build-machines:
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        machine: [nixos, ghost, kamrui-p1, inuc-celeron, inuc-i5, hp-notebook, hel-1, hel-2, hel-3, hel-4, hel-5]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true

      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build Machine ${{ matrix.machine }}
        run: nix build .#nixosConfigurations.${{ matrix.machine }}.config.system.build.toplevel

  build-artifacts:
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        artifact: [devShell, documentation]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true

      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build ${{ matrix.artifact }}
        run: nix build .#${{ matrix.artifact }} --show-trace

  build-oci:
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: oci-base
            image: home/infra/packages/base
          - package: oci-whoami
            image: home/infra/packages/whoami
          - package: oci-tofu-source
            image: home/flux-iac/tf-source/tofu
          - package: oci-tofu-runner
            image: home/flux-iac/tf-runner/tofu
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true

      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }} --show-trace

  publish:
    needs: 
      - build-machines
      - build-artifacts
      - build-oci
      - flake-check
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true

      - name: Install Nix  
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Nix Cache
        uses: DeterminateSystems/flakehub-cache-action@main
      
      - name: Build MkDocs
        run: nix build .#documentation

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: './result'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Publish to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: public
          name: andrewthomaslee/home
          include-output-paths: true
          rolling: true
          rolling-minor: 3

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.semver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Generate semver tag
        id: semver
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          TAG="0.3.${COMMIT_COUNT}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.semver.outputs.tag }} -m "Release ${{ steps.semver.outputs.tag }}" ${{ github.sha }}
          git push origin ${{ steps.semver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.semver.outputs.tag }}
          name: ${{ steps.semver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-oci:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: oci-base
            image: home/infra/packages/base
          - package: oci-whoami
            image: home/infra/packages/whoami
          - package: oci-tofu-source
            image: home/flux-iac/tf-source/tofu
          - package: oci-tofu-runner
            image: home/flux-iac/tf-runner/tofu
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          
      - name: Install Nix  
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Nix Cache
        uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build OCI image
        run: nix build .#${{ matrix.package }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load, Tag, and Push Docker image
        run: |
          # Load the image and capture the output to find the hash tag
          LOAD_OUTPUT=$(docker load -i result)
          # Expected output: "Loaded image: name:hash"
          LOADED_IMAGE=$(echo "$LOAD_OUTPUT" | grep -oP 'Loaded image: \K.*')
          
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          SEMVER_TAG="${{ needs.release.outputs.tag }}"
          
          # The loaded image is already tagged with the derivation hash
          # Tag with semver and latest
          docker tag $LOADED_IMAGE $IMAGE_NAME:$SEMVER_TAG
          docker tag $LOADED_IMAGE $IMAGE_NAME:latest
          
          # If the loaded image doesn't match the remote IMAGE_NAME, we need to tag it to match
          HASH_TAG=$(echo "$LOADED_IMAGE" | cut -d':' -f2)
          docker tag $LOADED_IMAGE $IMAGE_NAME:$HASH_TAG
          
          # Push all tags
          docker push $IMAGE_NAME:$HASH_TAG
          docker push $IMAGE_NAME:$SEMVER_TAG
          docker push $IMAGE_NAME:latest
          
          # Save digest to environment for the signing step
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME:latest)
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign the images with GitHub OIDC Token
        run: |
          cosign sign --yes ${IMAGE_DIGEST}
