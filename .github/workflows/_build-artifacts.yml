name: Reusable Build Artifacts
on: workflow_call
jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        artifact: [devShell, documentation]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Build ${{ matrix.artifact }}
        run: nix build .#${{ matrix.artifact }} --show-trace
