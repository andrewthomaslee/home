---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: flux-system
spec:
  interval: 30h
  chart:
    spec:
      chart: cloudflared
      version: "2.2.7"
      sourceRef:
        kind: HelmRepository
        name: cloudflared
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  targetNamespace: cloudflare
  values:
    nodeSelector:
      web: "true"
    tunnelSecrets:
      existingPemFileSecret:
        name: cloudflared-cert
        key: cert.pem
      existingConfigJsonFileSecret:
        name: cloudflared-credentials
        key: credentials.json
    tunnelConfig:
      name: domain.com
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 1m
        memory: 4Mi
    ingress:
      - service: http_status:404
