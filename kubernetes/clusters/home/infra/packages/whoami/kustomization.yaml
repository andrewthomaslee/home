apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../infra/packages/whoami
patches:
  - target:
      kind: Kustomization
      name: home-oci-packages-whoami
      namespace: flux-system
    patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: home-oci-packages-whoami
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: HTTPRoute
              name: whoami
              namespace: whoami
            patch: |-
              - op: add
                path: /spec/hostnames/-
                value: "whoami.andrewlee.fun"
