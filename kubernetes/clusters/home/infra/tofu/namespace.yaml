apiVersion: v1
kind: Namespace
metadata:
  name: tofu
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: home-oci-tofu-source
  namespace: tofu
spec:
  interval: 10m
  url: oci://ghcr.io/andrewthomaslee/home/flux-iac/tf-source/tofu
  ref:
    tag: latest
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: home-oci-tofu-runner
  namespace: tofu
spec:
  path: ./
  approvePlan: auto
  destroyResourcesOnDeletion: true
  interval: 5h
  sourceRef:
    kind: OCIRepository
    name: home-oci-tofu-source
  writeOutputsToSecret:
    name: home-oci-tofu-runner-output
    namespace: tofu
  fileMappings:
    - secretRef:
        name: tofu-env-secret
        key: env-file-content
      location: workspace
      path: .env
  runnerPodTemplate:
    spec:
      image: oci://ghcr.io/andrewthomaslee/home/flux-iac/tf-runner/tofu:latest