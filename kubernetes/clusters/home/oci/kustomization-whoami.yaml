---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oci-whoami
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./
  prune: true
  sourceRef:
    kind: OCIRepository
    name: oci-whoami
  patches:
    - patch: |-
        - op: add
          path: /spec/hostnames/-
          value: "whoami.andrewlee.fun"
      target:
        kind: HTTPRoute
        name: whoami
        namespace: whoami
