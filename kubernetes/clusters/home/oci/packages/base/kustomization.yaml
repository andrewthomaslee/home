apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - source-oci-base.json
  - kustomization-base.json
patches:
  - target:
      kind: Kustomization
      name: oci-base
      namespace: flux-system
    patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: oci-base
        namespace: flux-system
      spec:
        patches:
          - target:
              kind: HelmRelease
              name: sealed-secrets
              namespace: base
            patch: |-
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                name: sealed-secrets
                namespace: base
              spec:
                values:
                  ingress:
                    hostname: sealed-secrets.andrewlee.fun
