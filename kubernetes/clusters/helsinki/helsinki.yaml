              "namespace": "flux-system"
            },
            "version": "2.3.2"
          }
        },
        "values": {
          "deployment": {
            "replicaCount": 1
          },
          "garage": {
            "compressionLevel": 19,
            "metadataAutoSnapshotInterval": "2 days",
            "replicationFactor": 1
          },
          "image": {
            "tag": "2.3.0"
          },
          "nodeSelector": {
            "machine": "kamrui-p1"
          },
          "persistence": {
