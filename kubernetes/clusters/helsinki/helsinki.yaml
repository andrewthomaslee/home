        },
        "name": "garage"
      }
    },
    {
      "apiVersion": "helm.toolkit.fluxcd.io/v2",
      "kind": "HelmRelease",
      "metadata": {
        "labels": {
          "kubenix/hash": "ed2169d18cab197bd2a2cb6f78b2e5f9de263b9c"
        },
        "name": "cloudflared",
        "namespace": "cloudflare"
      },
      "spec": {
        "chart": {
          "spec": {
            "chart": "cloudflared",
            "interval": "24h",
            "sourceRef": {
              "kind": "HelmRepository",
              "name": "cloudflared",
              "namespace": "flux-system"
            },
            "version": "2.2.7"
          }
        },
        "interval": "24h",
        "values": {
          "ingress": [
            {
              "hostname": "whoami.andrewlee.cloud",
              "service": "http://whoami.whoami.svc.cluster.local:80"
            },
            {
              "hostname": "hubble.andrewlee.cloud",
              "service": "http://hubble-ui.kube-system.svc.cluster.local:80"
            },
            {
              "service": "http_status:404"
            }
          ],
          "resources": {
            "limits": {
              "cpu": "200m",
              "memory": "128Mi"
            },
            "requests": {
              "cpu": "100m",
              "memory": "64Mi"
            }
          },
          "tunnelConfig": {
            "name": "cloud"
          },
          "tunnelSecrets": {
            "existingConfigJsonFileSecret": {
              "name": "cloudflared-config-json-file-secret"
            },
            "existingPemFileSecret": {
              "name": "cloudflared-cert-pem-file-secret"
            }
          }
        }
      }
    },
    {
      "apiVersion": "helm.toolkit.fluxcd.io/v2",
      "kind": "HelmRelease",
      "metadata": {
        "labels": {
          "kubenix/hash": "ed2169d18cab197bd2a2cb6f78b2e5f9de263b9c"
        },
        "name": "garage",
        "namespace": "garage"
      },
      "spec": {
        "chart": {
          "spec": {
            "chart": "garage",
            "interval": "72h",
            "sourceRef": {
              "kind": "HelmRepository",
              "name": "garage",
              "namespace": "flux-system"
            },
            "version": "2.3.2"
          }
        },
        "interval": "24h",
        "values": {
          "deployment": {
            "replicaCount": 1
          },
          "garage": {
            "compressionLevel": 19,
            "metadataAutoSnapshotInterval": "2 days",
            "replicationFactor": 1
          },
          "image": {
            "tag": "v2.3.0"
          },
          "nodeSelector": {
            "role": "server"
          },
          "persistence": {
            "data": {
              "size": "50Gi",
              "storageClass": "local-path"
            },
            "meta": {
              "size": "5Gi",
              "storageClass": "local-path"
            }
          },
          "resources": {
            "limits": {
              "cpu": "2",
              "memory": "4Gi"
            },
            "requests": {
              "cpu": "100m",
              "memory": "128Mi"
            }
          }
        }
      }
    }
  ],
