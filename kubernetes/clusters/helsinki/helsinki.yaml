        },
        "name": "postgres",
        "namespace": "gitlab"
      },
      "spec": {
        "instances": 1,
        "nodeSelector": {
          "machine": "kamrui-p1"
        },
        "resources": {
          "limits": {
            "cpu": "2",
            "memory": "4Gi"
          },
          "requests": {
            "cpu": "100m",
            "memory": "128Mi"
          }
        },
        "storage": {
          "size": "150Gi",
          "storageClass": "local-path"
        },
        "walStorage": {
          "size": "10Gi",
          "storageClass": "local-path"
        }
      }
    },
